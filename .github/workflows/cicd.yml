name: CICD

on:
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      run_nix_vm: ${{ steps.files.outputs.run_nix_vm }}
      run_c_checks: ${{ steps.files.outputs.run_c_checks }}
      run_rust_checks: ${{ steps.files.outputs.run_rust_checks }}
      run_mdbook_check: ${{ steps.files.outputs.run_mdbook_check }}
    steps:
      - name: Determine changed files
        id: files
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const files = (await github.paginate(github.rest.pulls.listFiles, {
              ...context.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            })).map(file => file.filename)

            const needsVMTest = files.some(file => 
              file.endsWith('.rs') || 
              file.endsWith('.c') || 
              file.includes('.nix') ||
              file.includes('flake.lock') ||
              file.includes('Cargo.toml') || 
              file.includes('Cargo.lock')
            );

            const needsCFormatCheck = files.some(file => 
              file.endsWith('.c')
            );

            const needsRustQuality = files.some(file => 
              file.endsWith('.rs')
            );

            if (needsVMTest) {
              core.setOutput('run_nix_vm', 'true');
            }
            if (needsCFormatCheck) {
              core.setOutput('run_c_checks', 'true');
            }
            if (needsRustQuality) {
              core.setOutput('run_rust_checks', 'true');
            }

  rust-lint:
    name: Rust Lint
    runs-on: ubuntu-latest
    needs: [prepare]
    permissions:
      contents: read
      pull-requests: read
      checks: write
    if: needs.prepare.outputs.run_rust_checks == 'true'
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y clang libbpf-dev libudev-dev pkg-config gcc-multilib
      - uses: dtolnay/rust-toolchain@eac0f66a48bc4b70a10b9acd4c4e930f835d95ff # 1.95.0
        with:
          toolchain: 1.95.0
          components: clippy
      - uses: auguwu/clippy-action@9817d076b82df0194935be9db6154c56ac07b317 # 1.5.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          check-args: --locked --all-targets --all-features
          args: -D warnings

  rust-format:
    name: Rust Format
    runs-on: ubuntu-latest
    needs: [prepare]
    permissions:
      contents: read
      pull-requests: write
    if: needs.prepare.outputs.run_rust_checks == 'true'
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@nightly # Nightly
        with:
          toolchain: nightly
          components: rustfmt
      - name: Format code
        run: cargo +nightly fmt
      - name: Suggest formatting changes
        uses: reviewdog/action-suggester@2558ba17e65a9039e73764a73009fc05fef28a46 # v1.24.3
        with:
          tool_name: rustfmt

  c-format:
    name: C Format
    runs-on: ubuntu-latest
    needs: [prepare]
    if: needs.prepare.outputs.run_c_checks == 'true'
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format
      - run: clang-format --dry-run --Werror -i ./crates/cardwire-ebpf/src/bpf.c

  vm-test:
    runs-on: ubuntu-latest
    needs: [prepare, rust-lint, rust-format, c-format]
    if: ${{ !failure() && !cancelled() && needs.prepare.outputs.run_nix_vm == 'true' }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: determinateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - run: nix build .#vm-test
  
  mdbook-test:
    runs-on: ubuntu-latest
    needs: [prepare]
    if: needs.prepare.outputs.run_mdbook_check == 'true'
    env:
      MDBOOK_VERSION: 0.5.2
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install mdBook
        run: |
          curl --proto '=https' --tlsv1.2 https://sh.rustup.rs -sSf -y | sh
          rustup update
          cargo install --version ${MDBOOK_VERSION} mdbook
      - name: Test Pages
        id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: Test with mdBook
        run: mdbook test