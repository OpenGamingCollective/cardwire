name: ci/cd

on:
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      run_nix_vm: ${{ steps.files.outputs.run_nix_vm }}
      run_c_checks: ${{ steps.files.outputs.run_c_checks }}
      run_rust_checks: ${{ steps.files.outputs.run_rust_checks }}
    steps:
      - name: Determine changed files
        id: files
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const files = (await github.paginate(github.rest.pulls.listFiles, {
              ...context.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            })).map(file => file.filename)

            const needsVMTest = files.some(file => 
              file.endsWith('.rs') || 
              file.endsWith('.c') || 
              file.includes('.nix') ||
              file.includes('flake.lock') ||
              file.includes('Cargo.toml') || 
              file.includes('Cargo.lock')
            );

            const needsCFormatCheck = files.some(file => 
              file.endsWith('.c')
            );

            const needsRustQuality = files.some(file => 
              file.endsWith('.rs')
            );

            if (needsVMTest) {
              core.setOutput('run_nix_vm', 'true');
            }
            if (needsCFormatCheck) {
              core.setOutput('run_c_checks', 'true');
            }
            if (needsRustQuality) {
              core.setOutput('run_rust_checks', 'true');
            }

  rust-lint:
    name: Rust Lint
    runs-on: ubuntu-latest
    needs: [prepare]
    if: needs.prepare.outputs.run_rust_checks == 'true'
    steps:
    - uses: dtolnay/rust-toolchain@1.95.0
      with:
        components: rustfmt,clippy
    - uses: actions/checkout@v6
    - run: cargo clippy --locked --all-targets --all-features -- -D warnings


  rust-format:
    name: Rust Format
    runs-on: ubuntu-latest
    needs: [prepare]
    if: needs.prepare.outputs.run_rust_checks == 'true'
    steps:
    - uses: dtolnay/rust-toolchain@nightly
      with:
        components: rustfmt
    - uses: actions/checkout@v6
    - run: cargo fmt -- --check

  c-format:
    name: C Format
    runs-on: ubuntu-latest
    needs: [prepare]
    if: needs.prepare.outputs.run_c_checks == 'true'
    steps:
      - uses: RafikFarhad/clang-format-github-action@v6
        with:
          sources: "./crates/cardwire-ebpf/src/bpf.c"
          style: file

  vm-test:
    runs-on: ubuntu-latest
    needs: [prepare]
    if: needs.prepare.outputs.run_nix_vm == 'true'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
      - run: nix build .#vm-test