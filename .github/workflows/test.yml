name: Test

on:
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      run_tests: ${{ steps.files.outputs.run_tests }}
    steps:
      - name: Determine changed files
        id: files
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const files = (await github.paginate(github.rest.pulls.listFiles, {
              ...context.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            })).map(file => file.filename)

            const needsTest = files.some(file => 
              file.endsWith('.rs') || 
              file.endsWith('.c') || 
              file.includes('.nix') ||
              file.includes('flake.lock') ||
              file.includes('Cargo.toml') || 
              file.includes('Cargo.lock')
            );

            if (needsTest) {
              core.setOutput('run_tests', 'true');
            }
  vm-test:
    runs-on: ubuntu-latest
    needs: [prepare]
    if: needs.prepare.outputs.run_tests == 'true'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
      - run: nix build .#vm-test